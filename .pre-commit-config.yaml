repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (uv)
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        pass_filenames: true
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format (uv)
        entry: uv run ruff format
        language: system
        pass_filenames: true
        types_or: [python, pyi]
