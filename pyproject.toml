[project]
name = "mtproxymaxpy"
version = "1.0.0"
description = "MTProto proxy management platform"
requires-python = ">=3.13"
dependencies = [
    "rich>=13.0",
    "psutil>=5.9",
    "pydantic>=2.7",
    "pyTelegramBotAPI>=4.22",
    "httpx>=0.27",
    "typer>=0.12",
    "tomli-w>=1.0",
    "qrcode>=7.4",
]

[project.scripts]
mtproxymaxpy = "mtproxymaxpy.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mtproxymaxpy"]

[dependency-groups]
dev = [
    "pre-commit>=3.8",
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-mock>=3.14",
    "ruff>=0.15",
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "-ra",
    "--cov=mtproxymaxpy",
    "--cov-report=term-missing",
    "--cov-branch",
]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["src/mtproxymaxpy"]
omit = [
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 2

[tool.ruff]
target-version = "py313"
line-length = 120
indent-width = 4
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E402", "E741", "F401", "F541", "F841"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
