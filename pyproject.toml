[project]
name = "mtproxymaxpy"
version = "1.0.0"
description = "MTProto proxy management platform"
requires-python = ">=3.13"
dependencies = [
    "textual>=0.70",
    "pydantic>=2.7",
    "pyTelegramBotAPI>=4.22",
    "httpx>=0.27",
    "typer>=0.12",
    "tomli-w>=1.0",
    "qrcode>=7.4",
]

[project.scripts]
mtproxymaxpy = "mtproxymaxpy.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mtproxymaxpy"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-mock>=3.14",
    "textual-dev>=0.70",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
